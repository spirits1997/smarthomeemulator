name: Windows Portable Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore windows/SmartHomeEmulator.sln

      - name: Build (Release)
        run: msbuild windows/SmartHomeEmulator/SmartHomeEmulator.csproj /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Package portable zip
        shell: pwsh
        run: |
          $outDir = "windows/SmartHomeEmulator/bin/Release"
          if (!(Test-Path $outDir)) { throw "Build output not found: $outDir" }
          Compress-Archive -Path "$outDir\*" -DestinationPath "smarthomeEmulator-windows-portable.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthomeEmulator-windows-portable
          path: smarthomeEmulator-windows-portable.zip
          if-no-files-found: error
